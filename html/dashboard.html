<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Dashboard - Pollos</title>
	<link rel="stylesheet" href="../styles/style.css">
	<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>

<body>

	<header class="topbar">
		<div class="logo">🐔 Pollos El Diferente</div>
		<div class="user">Administrador ⌄</div>
	</header>

	<div class="container">

		<aside class="sidebar">
			<h3>Menú</h3>
			<ul>
				<li class="active"><a href="dashboard.html">Dashboard</a></li>
				<li><a href="inventario.html">Inventario</a></li>
				<li class="logout"><a href="../api/util/logout.php">Cerrar Sesión</a></li>
			</ul>
		</aside>

		<main class="content">
			<h2>¡Bienvenido, Administrador!</h2>

			<div class="cards" hx-get="../api/stats.php" hx-trigger="load" hx-swap="outerHTML">
				<div class="card red">
					<p>Pedidos Pendientes</p>
					<h3>-</h3>
				</div>
				<div class="card orange">
					<p>Órdenes del Día</p>
					<h3>-</h3>
				</div>
				<div class="card yellow">
					<p>Ingresos del Día</p>
					<h3>-</h3>
				</div>
				<div class="card blue">
					<p>Inventario Bajo</p>
					<h3>-</h3>
				</div>
			</div>

			<div class="grid">
				<div class="table" hx-get="../api/pedidos_recientes.php" hx-trigger="load" hx-swap="outerHTML">
					<h3>Pedidos Recientes</h3>
					<table>
						<thead>
							<tr>
								<th>Cliente</th>
								<th>Estado</th>
								<th>Total</th>
								<th>Hora</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td>Cargando...</td>
								<td>-</td>
								<td>-</td>
								<td>-</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="chart">
					<h3>Ventas de la Semana</h3>
					<canvas id="chartVentas" width="400" height="200"></canvas>
				</div>
			</div>

		</main>
	</div>

	<script>
		async function cargarGraficoVentas() {
			try {
				const response = await fetch('../api/ventas_semana.php');
				const data = await response.json();
				
				const ctx = document.getElementById('chartVentas').getContext('2d');
				new Chart(ctx, {
					type: 'bar',
					data: {
						labels: data.dias,
						datasets: [{
							label: 'Ventas ($)',
							data: data.totales,
							backgroundColor: '#ff6a00',
							borderColor: '#ff4d00',
							borderWidth: 1
						}]
					},
					options: {
						responsive: false,
						maintainAspectRatio: false,
						scales: {
							y: {
								beginAtZero: true,
								ticks: {
									callback: function(value) {
										return '$' + value.toFixed(2);
									}
								}
							}
						},
						plugins: {
							legend: {
								display: false
							}
						}
					}
				});
			} catch (error) {
				console.error('Error cargando gráfico de ventas:', error);
			}
		}
		
		// Cargar gráfico cuando la página esté lista
		document.addEventListener('DOMContentLoaded', cargarGraficoVentas);
	</script>

</body>

</html>
